<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NK | GeoSense Forensic Lab v4.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Share Tech Mono', monospace; color: #00ff66; }
        #instructions {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 10, 0, 0.95); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
        }
        #hud { position: absolute; bottom: 20px; left: 20px; font-size: 14px; pointer-events: none; }
        .btn { background: #00ff66; color: #000; border: none; padding: 15px 30px; cursor: pointer; font-family: inherit; font-weight: bold; margin-top: 20px; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="instructions">
        <h1 style="font-size: 48px; letter-spacing: 10px; text-shadow: 0 0 20px #00ff66;">GEOSENSE v4.0</h1>
        <p style="font-size: 18px; margin-top: -10px;">INITIALIZING FORENSIC ENVIRONMENT</p>
        <p style="font-size: 12px; opacity: 0.7;">[W,A,S,D] - MOVE | [MOUSE] - LOOK</p>
        <button class="btn" onclick="initializeSystem()">ACCESS MAIN TERMINAL</button>
    </div>

    <div id="hud">
        NK FORENSIC TECHNOLOGIES | <span style="color: #fff">OPERATOR: KRISHNAN NK (SR. DEV)</span><br>
        STATUS: ONLINE | SECTOR: GULF_250KM_JUMP<br>
        [ALERT] CRITICAL SPOOFING DETECTED
    </div>

    <script>
        // --- Core Scene ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.012);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- Lighting ---
        scene.add(new THREE.AmbientLight(0x404040, 2.5));
        const spot = new THREE.PointLight(0x00ff66, 2, 200);
        spot.position.set(0, 30, 0);
        scene.add(spot);

        // --- Neon Floor Grid ---
        const gridHelper = new THREE.GridHelper(500, 100, 0x00ff66, 0x001a00);
        scene.add(gridHelper);

        // --- Particle System ---
        const pGeometry = new THREE.BufferGeometry();
        const pCount = 5000;
        const pPos = new Float32Array(pCount * 3);
        for(let i=0; i<pCount*3; i++) pPos[i] = (Math.random() - 0.5) * 300;
        pGeometry.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
        const pMat = new THREE.PointsMaterial({ color: 0x00ff66, size: 0.1, transparent: true, opacity: 0.4 });
        const particles = new THREE.Points(pGeometry, pMat);
        scene.add(particles);

        // --- Evidence Displays ---
        createExhibit('Screenshot_20260407_150128_Maps.jpg', -30, -50, "Zone A: DETECTION");
        createExhibit('Screenshot_20260407_151951_GPS Test.jpg', 0, -65, "Zone B: ANALYSIS");
        createExhibit('Screenshot_20260407_152237_GPS Test.jpg', 30, -50, "Zone C: RESOLUTION");

        // --- Floating Code (Holographic Data) ---
        createCodeStream(-15, 10, -40, "NK_GeoSense_Spoof_Analyzer.py");
        createCodeStream(15, 10, -40, "GNSS_Integrity_Restore.py");

        // --- The Nova Satellite Model (Abstract) ---
        const satGeo = new THREE.BoxGeometry(10, 5, 2);
        const satMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, wireframe: true });
        const sat = new THREE.Mesh(satGeo, satMat);
        sat.position.set(0, 40, -100);
        scene.add(sat);

        // --- Satellite Laser Beam (Pulsing) ---
        const laserGeo = new THREE.CylinderGeometry(0.5, 0.5, 150, 8);
        const laserMat = new THREE.MeshBasicMaterial({ color: 0xff3333, transparent: true, opacity: 0.8 });
        const laser = new THREE.Mesh(laserGeo, laserMat);
        laser.position.set(0, -35, -100);
        scene.add(laser);

        camera.position.set(0, 5, 20);

        // --- Input Logic ---
        const keys = {};
        function initializeSystem() {
            document.getElementById('instructions').style.display = 'none';
            document.body.requestPointerLock();
            animate();
        }

        document.addEventListener('keydown', (e) => keys[e.code] = true);
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        let yaw = 0, pitch = 0;
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === document.body) {
                yaw -= e.movementX * 0.002;
                pitch -= e.movementY * 0.002;
                pitch = Math.max(-Math.PI/3, Math.min(Math.PI/3, pitch));
                camera.rotation.set(pitch, yaw, 0, 'YXZ');
            }
        });

        // --- Main Functions ---
        function createExhibit(img, x, z, label) {
            const tex = new THREE.TextureLoader().load(img);
            const plane = new THREE.Mesh(new THREE.PlaneGeometry(16, 10), new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide }));
            plane.position.set(x, 7, z);
            scene.add(plane);

            const edge = new THREE.BoxGeometry(16.5, 10.5, 0.3);
            const edgeMat = new THREE.MeshBasicMaterial({ color: 0x00ff66, wireframe: true });
            const frame = new THREE.Mesh(edge, edgeMat);
            frame.position.set(x, 7, z);
            scene.add(frame);
        }

        function createCodeStream(x, y, z, filename) {
            const geometry = new THREE.BoxGeometry(5, 8, 0.1);
            const material = new THREE.MeshBasicMaterial({ color: 0x00ff66, wireframe: true, transparent: true, opacity: 0.5 });
            const codeCube = new THREE.Mesh(geometry, material);
            codeCube.position.set(x, y, z);
            scene.add(codeCube);
        }

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);

            const speed = 0.4;
            if(keys['KeyW']) camera.translateZ(-speed);
            if(keys['KeyS']) camera.translateZ(speed);
            if(keys['KeyA']) camera.translateX(-speed);
            if(keys['KeyD']) camera.translateX(speed);
            camera.position.y = 5; // Fixed height

            particles.rotation.y += 0.0005;
            sat.rotation.y += 0.01;
            laserMat.opacity = 0.5 + Math.sin(Date.now() * 0.008) * 0.3; // Laser pulse

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
