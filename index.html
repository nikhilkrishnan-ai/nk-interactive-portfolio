<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NK | GeoSense Forensic 3D Terminal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Share Tech Mono', monospace; }
        
        /* Tactical HUD Overlay */
        #hud-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            border: 15px solid rgba(0, 255, 102, 0.05);
            box-sizing: border-box;
            z-index: 10;
        }

        #data-terminal {
            position: absolute;
            bottom: 30px; left: 30px;
            color: #00ff66;
            background: rgba(0, 15, 0, 0.85);
            padding: 20px;
            border-left: 4px solid #00ff66;
            font-size: 14px;
            z-index: 20;
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.2);
        }

        .scanning-beam {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 2px;
            background: rgba(0, 255, 102, 0.2);
            animation: scanLine 5s linear infinite;
        }

        @keyframes scanLine {
            0% { top: 0; }
            100% { top: 100%; }
        }

        #header-title {
            position: absolute;
            top: 40px; width: 100%;
            text-align: center;
            color: #ffffff;
            text-shadow: 0 0 15px #00ff66;
            font-size: 26px;
            letter-spacing: 6px;
            z-index: 20;
            font-weight: bold;
        }

        .alert-text {
            color: #ff3333;
            animation: pulseAlert 1s infinite;
        }

        @keyframes pulseAlert {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <div id="hud-overlay">
        <div class="scanning-beam"></div>
    </div>

    <div id="header-title">GEOSENSE FORENSIC INVESTIGATION</div>

    <div id="data-terminal">
        > IDENTITY: KRISHNAN NK (SR. FORENSIC DEVELOPER)<br>
        > OBJECTIVE: ANALYZE 250KM OFFSHORE JUMP<br>
        > MODULE: GEOSPATIAL SIGNAL INTEGRITY<br>
        > THREAT LEVEL: <span class="alert-text">CRITICAL SPOOFING DETECTED</span>
    </div>

    <script>
        // --- 3D Scene Initialization ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.015);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- Global Illumination ---
        const ambLight = new THREE.AmbientLight(0x404040, 2.5);
        scene.add(ambLight);
        const pntLight = new THREE.PointLight(0x00ff66, 1.5, 150);
        pntLight.position.set(0, 15, 15);
        scene.add(pntLight);

        // --- Tactical Floor Grid ---
        const gridHelper = new THREE.GridHelper(300, 80, 0x00ff66, 0x001a00);
        scene.add(gridHelper);

        // --- Forensic Evidence Boards ---
        function addEvidenceBoard(imgSrc, x, z, rotationY) {
            const texLoader = new THREE.TextureLoader();
            const geometry = new THREE.PlaneGeometry(10, 6);
            const material = new THREE.MeshBasicMaterial({ 
                map: texLoader.load(imgSrc),
                side: THREE.DoubleSide
            });
            const board = new THREE.Mesh(geometry, material);
            board.position.set(x, 5, z);
            board.rotation.y = rotationY;
            scene.add(board);

            // Tech Frame
            const frameGeo = new THREE.BoxGeometry(10.3, 6.3, 0.15);
            const frameMat = new THREE.MeshBasicMaterial({ color: 0x00ff66, wireframe: true });
            const frame = new THREE.Mesh(frameGeo, frameMat);
            frame.position.set(x, 5, z);
            frame.rotation.y = rotationY;
            scene.add(frame);
        }

        // --- Load User Data ---
        addEvidenceBoard('Screenshot_20260407_150128_Maps.jpg', -18, -15, 0.5);
        addEvidenceBoard('Screenshot_20260407_151951_GPS Test.jpg', 0, -22, 0);
        addEvidenceBoard('Screenshot_20260407_152237_GPS Test.jpg', 18, -15, -0.5);

        // --- Core Anomaly (GPS Spoofing Representation) ---
        const anomalyGeo = new THREE.IcosahedronGeometry(2.5, 1);
        const anomalyMat = new THREE.MeshBasicMaterial({ color: 0xff3333, wireframe: true });
        const anomalyCore = new THREE.Mesh(anomalyGeo, anomalyMat);
        anomalyCore.position.y = 4;
        scene.add(anomalyCore);

        camera.position.set(0, 6, 25);

        // --- Rendering Loop ---
        function animate() {
            requestAnimationFrame(animate);

            // Core Anomaly Animation
            anomalyCore.rotation.y += 0.015;
            anomalyCore.rotation.z += 0.008;
            const pulse = 1 + Math.sin(Date.now() * 0.004) * 0.25;
            anomalyCore.scale.set(pulse, pulse, pulse);

            renderer.render(scene, camera);
        }

        // --- Interactive Camera Control ---
        let targetX = 0, targetY = 0;
        document.addEventListener('mousemove', (e) => {
            targetX = (e.clientX - window.innerWidth / 2) * 0.04;
            targetY = (e.clientY - window.innerHeight / 2) * 0.04;
            
            camera.position.x += (targetX - camera.position.x) * 0.05;
            camera.position.y += (-targetY + 6 - camera.position.y) * 0.05;
            camera.lookAt(anomalyCore.position);
        });

        // Window Resize Handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
