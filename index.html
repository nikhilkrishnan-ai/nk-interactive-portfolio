<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NK | GeoSense 3D Pro Investigator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Share Tech Mono', monospace; }
        #instructions {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #0f0; text-align: center; background: rgba(0,20,0,0.8);
            padding: 20px; border: 2px solid #0f0; z-index: 100;
        }
        #hud { position: absolute; bottom: 20px; left: 20px; color: #0f0; z-index: 10; font-size: 14px; }
    </style>
</head>
<body>

    <div id="instructions">
        <h1>INVESTIGATION TERMINAL</h1>
        <p>USE <b>W, A, S, D</b> TO WALK</p>
        <p>USE <b>MOUSE</b> TO LOOK AROUND</p>
        <button onclick="this.parentElement.style.display='none'" style="background:#0f0; border:none; padding:10px 20px; cursor:pointer;">START ANALYSIS</button>
    </div>

    <div id="hud">
        > SYSTEM: GEOSENSE v2.5<br>
        > MODE: INTERACTIVE INVESTIGATION
    </div>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Grid Floor
        const grid = new THREE.GridHelper(500, 100, 0x00ff66, 0x002200);
        scene.add(grid);

        // Lighting
        const light = new THREE.PointLight(0x00ff66, 2, 300);
        light.position.set(0, 20, 0);
        scene.add(light);

        // Evidence Boards with Collision/Interaction
        function createBoard(img, x, z) {
            const tex = new THREE.TextureLoader().load(img);
            const mesh = new THREE.Mesh(
                new THREE.PlaneGeometry(12, 8),
                new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide })
            );
            mesh.position.set(x, 5, z);
            scene.add(mesh);
            
            const frame = new THREE.Mesh(
                new THREE.BoxGeometry(12.5, 8.5, 0.2),
                new THREE.MeshBasicMaterial({ color: 0x00ff66, wireframe: true })
            );
            frame.position.set(x, 5, z);
            scene.add(frame);
        }

        // Loading your screens
        createBoard('Screenshot_20260407_150128_Maps.jpg', -20, -30);
        createBoard('Screenshot_20260407_151951_GPS Test.jpg', 0, -40);
        createBoard('Screenshot_20260407_152237_GPS Test.jpg', 20, -30);

        camera.position.set(0, 5, 10);

        // Movement Logic
        const keys = {};
        document.addEventListener('keydown', (e) => keys[e.code] = true);
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        function updateMovement() {
            const speed = 0.4;
            if (keys['KeyW']) camera.translateZ(-speed);
            if (keys['KeyS']) camera.translateZ(speed);
            if (keys['KeyA']) camera.translateX(-speed);
            if (keys['KeyD']) camera.translateX(speed);
            camera.position.y = 5; // Keep height steady
        }

        // Mouse Look
        let yaw = 0, pitch = 0;
        document.addEventListener('mousemove', (e) => {
            yaw -= e.movementX * 0.002;
            pitch -= e.movementY * 0.002;
            pitch = Math.max(-Math.PI/3, Math.min(Math.PI/3, pitch));
            camera.rotation.set(pitch, yaw, 0, 'YXZ');
        });

        // Request Pointer Lock for better feel
        document.body.onclick = () => document.body.requestPointerLock();

        function animate() {
            requestAnimationFrame(animate);
            updateMovement();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
