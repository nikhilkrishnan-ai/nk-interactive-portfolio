name: Sync Code to Gemini

on:
  push:
    branches: [ main ]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Fetch the last two commits to compute a diff

      - name: Generate Diff and Send to Webhook
        env:
          WEBHOOK_URL: ${{ secrets.GEMINI_WEBHOOK_URL }}
          AUTH_TOKEN: ${{ secrets.WEBHOOK_AUTH_TOKEN }}
        run: |
          # 1. Capture the diff of the most recent commit
          # We use --unified=0 to keep the payload concise
          DIFF_CONTENT=$(git diff HEAD~1 HEAD)
          
          # 2. Prepare the prompt for the AI
          PROMPT="I am pushing new code changes. Please analyze this diff, summarize the changes, and update your internal context for this project."

          # 3. Use jq to build a safe JSON payload (handles escaping newlines/quotes)
          JSON_PAYLOAD=$(jq -n \
            --arg prompt "$PROMPT" \
            --arg context "$DIFF_CONTENT" \
            '{prompt: $prompt, context: $context}')

          # 4. Send the request to your Cloud Run Webhook
          curl -X POST "$WEBHOOK_URL/webhook" \
            -H "Authorization: Bearer $AUTH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$JSON_PAYLOAD" \
            --fail \
            --show-error

